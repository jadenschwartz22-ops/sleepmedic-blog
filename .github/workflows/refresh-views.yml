name: Refresh Public View Counts

on:
  workflow_dispatch: {}
  schedule:
    # Daily at 13:00 UTC (independent of the Mon/Thu publish cadence)
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CLIENT_EMAIL: ${{ secrets.GA4_CLIENT_EMAIL }}
      GA4_PRIVATE_KEY: ${{ secrets.GA4_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch view counts
        run: node scripts/fetch-public-views.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/data/views.json
          git diff --cached --quiet || git commit -m "chore: refresh blog view counts [skip ci]"
          git push
