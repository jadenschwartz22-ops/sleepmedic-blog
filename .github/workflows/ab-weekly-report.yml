name: A/B Weekly Report

on:
  schedule:
    # Every Monday at 10:00 AM Mountain Time (17:00 UTC)
    - cron: "0 17 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CLIENT_EMAIL: ${{ secrets.GA4_CLIENT_EMAIL }}
      GA4_PRIVATE_KEY: ${{ secrets.GA4_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch GA4 metrics (skipped if secrets missing)
        run: |
          if [ -n "$GA4_PROPERTY_ID" ] && [ -n "$GA4_CLIENT_EMAIL" ] && [ -n "$GA4_PRIVATE_KEY" ]; then
            node scripts/ab/fetch-ga4.mjs --days 90
          else
            echo "GA4 secrets not configured — dashboard will show tag distributions only. See AB.md for setup."
          fi

      - name: Build dashboard
        run: node scripts/ab/build-dashboard.mjs

      - name: Print top rankings to workflow summary
        run: |
          echo "# SleepMedic A/B Weekly Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard: [blog/ab-dashboard.html](../../blob/main/blog/ab-dashboard.html)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f blog/ab-analytics.json ]; then
            echo "## Top 5 posts by avg engagement time" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const a=require('./blog/ab-analytics.json').filter(r=>r.tagged);
              a.sort((x,y)=>(y.avg_engagement_seconds||0)-(x.avg_engagement_seconds||0));
              for (const r of a.slice(0,5)) console.log((r.avg_engagement_seconds||0).toFixed(1)+'s', '|', r.energy, '/', r.opening_vehicle, '->', r.closing_vehicle, '|', r.slug);
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Energy x avg engagement (mean)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const a=require('./blog/ab-analytics.json').filter(r=>r.tagged);
              const g={};
              for (const r of a) { g[r.energy] = g[r.energy]||[]; g[r.energy].push(r.avg_engagement_seconds||0); }
              const rows=Object.entries(g).map(([k,xs])=>[k, xs.length, xs.reduce((a,b)=>a+b,0)/xs.length]);
              rows.sort((a,b)=>b[2]-a[2]);
              for (const [k,n,m] of rows) console.log(k.padEnd(12), 'n='+n, m.toFixed(1)+'s');
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No analytics data yet — add GA4 secrets to enable." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ab-dashboard.html blog/ab-analytics.json 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "A/B: weekly report [skip ci]"
            git push
          else
            echo "No dashboard changes to commit"
          fi
