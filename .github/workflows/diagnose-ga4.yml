name: Diagnose GA4 Views (one-off)

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CLIENT_EMAIL: ${{ secrets.GA4_CLIENT_EMAIL }}
      GA4_PRIVATE_KEY: ${{ secrets.GA4_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/diagnose-ga4-views.mjs
