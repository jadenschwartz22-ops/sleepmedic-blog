name: Weekly Blog - Fully Automated

on:
  schedule:
    # Every Monday at 9:00 AM Mountain Time (16:00 UTC)
    - cron: "0 16 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    env:
      TZ: America/Denver
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate blog post (multi-agent pipeline)
        id: generate
        run: |
          node scripts/generate-blog-post.mjs

          # Use heredoc delimiters -- safe for titles with apostrophes/quotes
          {
            echo "title<<ENDVAL"
            jq -r '.title' tmp/post-metadata.json
            echo "ENDVAL"
            echo "filename<<ENDVAL"
            jq -r '.filename' tmp/post-metadata.json
            echo "ENDVAL"
            echo "topic<<ENDVAL"
            jq -r '.topic' tmp/post-metadata.json
            echo "ENDVAL"
            echo "tag<<ENDVAL"
            jq -r '.tag' tmp/post-metadata.json
            echo "ENDVAL"
            echo "excerpt<<ENDVAL"
            jq -r '.excerpt' tmp/post-metadata.json
            echo "ENDVAL"
            echo "has_image<<ENDVAL"
            jq -r '.hasAiImage' tmp/post-metadata.json
            echo "ENDVAL"
          } >> "$GITHUB_OUTPUT"

      - name: Generate RSS feed
        run: node scripts/generate-rss-feed.mjs

      - name: Generate posts index
        run: node scripts/generate-posts-index.mjs

      - name: Commit topic history and content memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .topic-history.json .content-memory.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update topic history and content memory"

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "blog: Add ${{ steps.generate.outputs.filename }} (auto-published)"
          title: "Auto-Published: ${{ steps.generate.outputs.title }}"
          body: |
            ## Automated Blog Post (Multi-Agent Pipeline)

            **Topic:** ${{ steps.generate.outputs.topic }}
            **Tag:** ${{ steps.generate.outputs.tag }}
            **Title:** ${{ steps.generate.outputs.title }}
            **File:** `blog/posts/${{ steps.generate.outputs.filename }}`
            **AI Cover Image:** ${{ steps.generate.outputs.has_image }}

            ---

            ### Pipeline Agents

            1. **Planner** - Created outline and structure (Gemini 2.5 Flash)
            2. **Section Writers** - One call per section for varied voice
            3. **Editor** - Reviewed full draft, removed AI-isms
            4. **Cross-Linker** - Added internal links to related posts
            5. **Gemini Image** - Generated cover image (native image gen)

            ---

            ### Auto-Merge Status

            This PR will be automatically merged in 5 minutes if all checks pass.
            To stop auto-merge, comment `/hold` on this PR.

            ---

            ### Preview

            After merge: `https://sleepmedic.co/blog/posts/${{ steps.generate.outputs.filename }}`

          branch: auto-blog-${{ github.run_number }}
          base: main
          labels: blog, auto-generated, auto-merge
          delete-branch: true

      - name: Wait for checks
        run: |
          echo "Waiting 30 seconds for GitHub to process PR..."
          sleep 30

      - name: Auto-merge PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pull-request-number }}"
          echo "Waiting for PR to be ready..."
          sleep 10

          gh pr merge "$PR_NUMBER" --squash --auto --body "Auto-merged by weekly automation"
          echo "PR #$PR_NUMBER set to auto-merge"

          sleep 5
          if gh pr merge "$PR_NUMBER" --squash --body "Auto-merged by weekly automation" 2>/dev/null; then
            echo "PR #$PR_NUMBER merged successfully"
          else
            echo "PR #$PR_NUMBER will auto-merge when checks complete"
          fi

      - name: Create summary issue
        if: success()
        env:
          POST_TITLE: ${{ steps.generate.outputs.title }}
          POST_FILENAME: ${{ steps.generate.outputs.filename }}
          PR_NUM: ${{ steps.pr.outputs.pull-request-number }}
          HAS_IMAGE: ${{ steps.generate.outputs.has_image }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.POST_TITLE;
            const filename = process.env.POST_FILENAME;
            const prNumber = process.env.PR_NUM;
            const hasImage = process.env.HAS_IMAGE;

            const imageStatus = hasImage === 'true' ? 'Yes (Gemini native)' : 'No (generation unavailable)';
            const body = [
              '## Blog Auto-Published Successfully',
              '',
              `**Title:** ${title}`,
              `**File:** \`blog/posts/${filename}\``,
              `**PR:** #${prNumber}`,
              `**AI Cover Image:** ${imageStatus}`,
              `**Pipeline:** Planner -> Section Writers -> Editor -> Cross-Linker -> Gemini Image`,
              '',
              '### Links',
              '',
              `- [View PR](https://github.com/${{ github.repository }}/pull/${prNumber})`,
              `- [Live Post](https://sleepmedic.co/blog/posts/${filename}) (available after merge)`,
              '',
              '### Next Post',
              '',
              'Next blog post will be automatically generated and published next Monday at 9:00 AM MT.',
              '',
              '---',
              '',
              '*This issue will auto-close in 7 days.*'
            ].join('\n');

            const resp = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-Published: ${title}`,
              body,
              labels: ['blog', 'auto-published']
            });

            core.info(`Created summary issue #${resp.data.number}`);

      - name: Trigger distribution (Pi service)
        if: success()
        continue-on-error: true
        env:
          PI_WEBHOOK_URL: ${{ secrets.PI_WEBHOOK_URL }}
          PI_ADMIN_KEY: ${{ secrets.PI_ADMIN_KEY }}
          POST_TITLE: ${{ steps.generate.outputs.title }}
          POST_FILENAME: ${{ steps.generate.outputs.filename }}
          POST_EXCERPT: ${{ steps.generate.outputs.excerpt }}
        run: |
          if [ -n "$PI_WEBHOOK_URL" ]; then
            curl -s -X POST "${PI_WEBHOOK_URL}/trigger-send?key=${PI_ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"title\": $(echo "$POST_TITLE" | jq -Rs '.'), \"link\": \"https://sleepmedic.co/blog/posts/${POST_FILENAME}\", \"excerpt\": $(echo "$POST_EXCERPT" | jq -Rs '.')}" \
              || echo "Pi webhook failed (non-critical)"
          else
            echo "PI_WEBHOOK_URL not set, skipping distribution"
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Blog Pipeline Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Blog Generation Failed\n\nWorkflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nCheck the logs for details.`,
              labels: ['blog', 'bug']
            });

      - name: Cleanup tmp
        if: always()
        run: |
          rm -rf tmp/
          echo "Cleanup complete"
