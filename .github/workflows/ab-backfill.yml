name: A/B Backfill

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-tag posts even if already tagged"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Weekly Blog - Fully Automated"]
    types: [completed]

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Backfill tags
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            node scripts/ab/backfill.mjs --force
          else
            node scripts/ab/backfill.mjs
          fi

      - name: Summary
        run: |
          echo "### A/B tag summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f private/ab-tags.json ]; then
            TAGGED=$(node -e "const t=require('./private/ab-tags.json'); console.log(Object.keys(t).length)")
            echo "Tagged posts: **$TAGGED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Energy" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const t=require('./private/ab-tags.json');
              const c={};
              for (const v of Object.values(t)) c[v.energy]=(c[v.energy]||0)+1;
              for (const [k,n] of Object.entries(c).sort((a,b)=>b[1]-a[1])) console.log(k.padEnd(12), n);
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Voice intensity" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const t=require('./private/ab-tags.json');
              const c={};
              for (const v of Object.values(t)) c[v.voice_intensity]=(c[v.voice_intensity]||0)+1;
              for (const [k,n] of Object.entries(c).sort((a,b)=>b[1]-a[1])) console.log(k.padEnd(12), n);
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Length bucket" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const t=require('./private/ab-tags.json');
              const c={};
              for (const v of Object.values(t)) c[v.length_bucket]=(c[v.length_bucket]||0)+1;
              for (const [k,n] of Object.entries(c).sort((a,b)=>b[1]-a[1])) console.log(k.padEnd(12), n);
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain private/)" ]; then
            git add private/
            git commit -m "A/B: update tags [skip ci]"
            git push
          else
            echo "No tag changes"
          fi
